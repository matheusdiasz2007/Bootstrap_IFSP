<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venda de Ingresso</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4>Cadastro de Compra de Ingresso</h4>
        </div>

        <div class="card-body">
            <form>

                <!-- Dados do comprador -->
                <h5 class="mb-3">Dados do Comprador</h5>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Nome completo</label>
                        <input type="text" class="form-control" placeholder="Digite seu nome" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" placeholder="Digite seu email" required>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Telefone</label>
                        <input type="tel" class="form-control" placeholder="(11) 99999-9999">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">CPF</label>
                        <input type="text" class="form-control" placeholder="000.000.000-00">
                    </div>
                </div>

                <!-- Cor da camiseta -->
                <div class="mb-3">
                    <label class="form-label">Escolha a cor da camiseta (brinde)</label>
                    <input type="color" class="form-control form-control-color">
                </div>

                <!-- Setor -->
                <div class="mb-3">
                    <label class="form-label">Setor da arquibancada</label>
                    <select class="form-select">
                        <option selected disabled>Selecione um setor</option>
                        <option>Pista</option>
                        <option>Pista Premium</option>
                        <option>Camarote</option>
                        <option>Arquibancada Superior</option>
                        <option>Arquibancada Inferior</option>
                    </select>
                </div>

                <!-- Upload de foto -->
                <div class="mb-3">
                    <label class="form-label">Foto para o crachá</label>
                    <input type="file" class="form-control" accept="image/*">
                </div>

                <!-- Botões -->
                <div class="d-flex justify-content-end gap-2">
                    <button type="reset" class="btn btn-secondary">Limpar</button>
                    <button type="submit" class="btn btn-success">Salvar</button>
                </div>

            </form>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
